name: Scrape & Update Sources

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force scrape even if no changes detected'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 6 */3 * *'   # Every 3 days at 06:00 UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
        run: python scripts/scrape.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/last_rentry_state.json
          git diff --cached --quiet || git commit -m "chore: update state [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
